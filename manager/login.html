<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Forest Green Estates Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
  
  <style>
    :root {
      --green: #1A3A2A;
      --green-dark: #11271C;
      --gold: #C9A84C;
      --cream: #F5F7F3;
      --text: #2C3E35;
      --text-light: #5A7065;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--green-dark);
      background-image: linear-gradient(135deg, var(--green-dark) 0%, #0d1e15 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 1rem;
      overflow: hidden;
    }

    /* Background map pattern simulation */
    .bg-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: radial-gradient(var(--gold) 1px, transparent 0);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: 100%;
      max-width: 420px;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(201, 168, 76, 0.2);
      z-index: 10;
      animation: cardFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes cardFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-wrap img {
      height: 52px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--green);
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .login-header p {
      font-size: 0.8rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    /* Form control */
    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      font-family: 'Montserrat', sans-serif;
      padding: 0.85rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(26, 58, 42, 0.15);
      font-size: 0.9rem;
      color: var(--text);
      background-color: var(--cream);
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      background-color: white;
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.1);
    }

    /* Error Message */
    .error-msg {
      background-color: rgba(231, 76, 60, 0.1);
      color: #c0392b;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 1.5rem;
      display: none;
      border: 1px solid rgba(231, 76, 60, 0.2);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Submit Button */
    .btn-login {
      width: 100%;
      padding: 0.95rem;
      border: none;
      border-radius: 8px;
      background-color: var(--gold);
      color: white;
      font-weight: 600;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.15);
    }

    .btn-login:hover {
      background-color: var(--green);
      box-shadow: 0 4px 20px rgba(26, 58, 42, 0.25);
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.78rem;
      color: var(--text-light);
      text-decoration: none;
      transition: 0.3s;
    }

    .back-home:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="login-card">
    <div class="logo-wrap">
      <img src="../assets/images/forest-green-logo-cropped.png" alt="Logo">
    </div>
    
    <div class="login-header">
      <h1>Manager Access</h1>
      <p>Secure Portal Login</p>
    </div>

    <div class="error-msg" id="errorBlock">
      Invalid username or password. Please try again.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Enter username">
      </div>
      
      <div class="form-group" style="margin-bottom: 2rem;">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter password">
      </div>

      <button type="submit" class="btn-login">Login to Dashboard</button>
    </form>

    <a href="../index.html" class="back-home">&larr; Return to Website</a>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('forestGreenAdminToken')) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorBlock = document.getElementById('errorBlock');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBlock.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (response.ok) {
          const data = await response.json();
          // Store token in session storage
          sessionStorage.setItem('forestGreenAdminToken', data.token);
          // Redirect to dashboard
          window.location.href = 'dashboard.html';
        } else {
          showError();
        }
      } catch (err) {
        showError('Network error. Database is unavailable.');
      }
    });

    function showError(msg) {
      if (msg) {
        errorBlock.textContent = msg;
      } else {
        errorBlock.textContent = 'Invalid username or password. Please try again.';
      }
      errorBlock.style.display = 'block';
    }
  </script>
</body>
</html>
